name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  lint:
    name: lint + types + bandit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version
          cache: pip

      - name: Install package (dev)
        run: python -m pip install -e ".[dev]"

      - name: ruff
        run: ruff check src/ tests/

      - name: mypy --strict
        run: mypy src/

      - name: bandit
        run: bandit -r src/ -c pyproject.toml

  test:
    name: tests + coverage + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version
          cache: pip

      - name: Install package (dev)
        run: python -m pip install -e ".[dev]"

      - name: Run tests under coverage
        run: pytest tests/ --cov=aiagent --cov-branch -p no:cacheprovider

      - name: Build wheel + sdist
        run: |
          python -m pip install build
          python -m build

      - name: Gate — skill data shipped in the wheel
        run: |
          count=$(unzip -l dist/*.whl | grep -c 'SKILL.md' || true)
          echo "SKILL.md entries in wheel: $count"
          test "$count" -ge 2 || (echo "builtin skills missing from wheel" && exit 1)

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/*
